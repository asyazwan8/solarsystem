<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Solar System AR</title>

    <!-- Critical background so first paint is dark, before style.css loads -->
    <style>
      html,
      body {
        margin: 0;
        background: #0f0f11;
        color: #f5f5f5;
      }
    </style>

    <!-- Google's <model-viewer>, pinned via jsDelivr.
         (Google's own CDN, ajax.googleapis.com, only serves up to 3.0.0.) -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js"
    ></script>
  </head>

  <body>
    <!-- ===== Gallery view ===== -->
    <main id="gallery-view">
      <header class="app-header">
        <h1>Solar System AR</h1>
        <p class="subtitle">Tap a model to view it in 3D &amp; AR</p>
      </header>
      <div id="grid" class="grid"></div>
    </main>

    <!-- ===== Single-model viewer ===== -->
    <section id="viewer-view" hidden>
      <button id="back-button" type="button">
        <span aria-hidden="true">&lsaquo;</span> Back
      </button>
      <h2 id="viewer-title" class="viewer-title"></h2>

      <model-viewer
        id="viewer"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        ar-scale="auto"
        camera-controls
        auto-rotate
        autoplay
        shadow-intensity="1"
        alt=""
      >
        <!-- model-viewer's default AR button is icon-only, so we supply our
             own labelled button in the documented ar-button slot. -->
        <button id="ar-button" slot="ar-button" type="button">View in AR</button>
      </model-viewer>
    </section>

    <script type="module" src="/main.js"></script>
  </body>
</html>
