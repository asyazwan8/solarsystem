<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Solar System AR</title>

    <!-- Critical background so first paint is dark, before style.css loads -->
    <style>
      html,
      body {
        margin: 0;
        background: #0f0f11;
        color: #f5f5f5;
      }
    </style>

    <!-- Google's <model-viewer>, pinned via jsDelivr.
         (Google's own CDN, ajax.googleapis.com, only serves up to 3.0.0.) -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.1.0/dist/model-viewer.min.js"
    ></script>
  </head>

  <body>
    <!-- The app opens straight into the solar system. Tap a planet to open it. -->
    <section id="viewer-view">
      <button id="back-button" type="button" hidden>
        <span aria-hidden="true">&lsaquo;</span> Back
      </button>
      <button id="info-button" type="button" aria-label="About this planet" hidden>
        <span aria-hidden="true">i</span>
      </button>
      <h2 id="viewer-title" class="viewer-title"></h2>

      <model-viewer
        id="viewer"
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls
        autoplay
        interaction-prompt="none"
        shadow-intensity="0.4"
        exposure="1"
        alt=""
      >
        <button id="ar-button" slot="ar-button" type="button">View in AR</button>
      </model-viewer>

      <!-- Tap a planet hint (home only) -->
      <p id="hint" class="hint" hidden>Tap a planet to explore it &middot; pinch to zoom</p>

      <!-- Move between planets: swipe across the model, or tap these arrows -->
      <button id="prev-button" class="nav-arrow" type="button" aria-label="Previous planet" hidden>
        <span aria-hidden="true">&lsaquo;</span>
      </button>
      <button id="next-button" class="nav-arrow nav-arrow--right" type="button" aria-label="Next planet" hidden>
        <span aria-hidden="true">&rsaquo;</span>
      </button>

      <!-- Kid-friendly fun facts (planet pages); tap one for the floating window -->
      <div id="facts-bar" class="facts-bar" hidden></div>

      <!-- Floating info window (sits on top of the model) -->
      <div id="info-sheet" class="info-sheet" hidden>
        <div class="info-backdrop" data-close></div>
        <div class="info-card" role="dialog" aria-modal="true" aria-labelledby="info-title">
          <button class="info-close" type="button" data-close aria-label="Close">&times;</button>
          <h2 id="info-title"></h2>
          <p id="info-body"></p>
        </div>
      </div>
    </section>

    <script type="module" src="/main.js"></script>
  </body>
</html>
